<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Svištinec – Fotky</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fdf6f0;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #c67b45;
      color: white;
      padding: 20px;
      box-sizing: border-box;
    }

    .nav-button {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      background: #d48146;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .nav-button:hover {
      background: #a96535;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
    }

    /* GALERIE */
    .gallery {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      padding: 30px;
      box-sizing: border-box;
    }

    .gallery-item {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }

    /* WRAPPER NA OBRÁZEK – fixní výška + tmavé pozadí, aby celý obrázek byl vidět */
    .gallery-item .img-wrap {
      width: 100%;
      height: 500px;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .gallery-item img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .gallery-item .desc {
      padding: 14px;
      font-size: 16px;
      color: #a90000;
      font-weight: bold;
    }

    /* AKČNÍ LIŠTA POD OBRÁZKEM */
    .post-actions {
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    .action-btn {
      background: none;
      border: 1px solid #c67b45;
      color: #c67b45;
      border-radius: 20px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .action-btn:hover {
      background: #c67b45;
      color: white;
    }

    .action-btn.liked {
      background: #c67b45;
      color: white;
    }

    .action-btn .icon {
      font-size: 16px;
    }

    /* SEKCE KOMENTÁŘŮ */
    .comments-section {
      display: none;
      padding: 14px;
      border-top: 1px solid #eee;
      background: #fff;
    }

    .comments-section.open {
      display: block;
    }

    .comment {
      background: #000000;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .comment .author {
      font-weight: bold;
      color: #a90000;
      margin-right: 6px;
    }

    .comment-form {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .comment-form input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .comment-form input[name="author"] {
      width: 110px;
    }

    .comment-form input[name="text"] {
      flex: 1;
    }

    .comment-form button {
      background: #c67b45;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .comment-form button:hover {
      background: #a96535;
    }

    .no-comments {
      color: #ffffff;
      font-style: italic;
      font-size: 13px;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .gallery-item .img-wrap { height: 400px; }
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar   { width: 100%; }
      .gallery   { grid-template-columns: 1fr; padding: 15px; gap: 20px; }
      .gallery-item .img-wrap { height: 350px; }
    }
  </style>
</head>
<body>

<script>
  const STORAGE_KEY = 'svistinec_data';

  // ----- DATA LAYER -----
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.warn('Nelze načíst data:', e);
      return {};
    }
  }

  function saveData(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      console.warn('Nelze uložit data:', e);
    }
  }

  function getPost(postId) {
    const data = loadData();
    if (!data[postId]) {
      data[postId] = { likes: 0, liked: false, comments: [] };
    }
    return data[postId];
  }

  function updatePost(postId, updater) {
    const data = loadData();
    if (!data[postId]) data[postId] = { likes: 0, liked: false, comments: [] };
    updater(data[postId]);
    saveData(data);
  }

  // ----- RENDERING -----
  document.querySelectorAll('.gallery-item').forEach(item => {
    const postId = item.dataset.postId;
    const post = getPost(postId);

    const actions = document.createElement('div');
    actions.className = 'post-actions';

    const likeBtn = document.createElement('button');
    likeBtn.className = 'action-btn like-btn' + (post.liked ? ' liked' : '');
    likeBtn.innerHTML = `<span class="icon">❤</span> <span class="like-count">${post.likes}</span>`;

    const commentToggleBtn = document.createElement('button');
    commentToggleBtn.className = 'action-btn';
    commentToggleBtn.innerHTML = `<span class="icon">💬</span> <span class="comment-count">${post.comments.length}</span>`;

    actions.append(likeBtn, commentToggleBtn);

    const commentsSection = document.createElement('div');
    commentsSection.className = 'comments-section';
    commentsSection.innerHTML = `
      <div class="comments-list"></div>
      <div class="comment-form">
        <input type="text" name="author" placeholder="Jméno" maxlength="20">
        <input type="text" name="text" placeholder="Napiš komentář..." maxlength="200">
        <button type="button">Odeslat</button>
      </div>
    `;

    item.append(actions, commentsSection);

    function renderComments() {
      const list = commentsSection.querySelector('.comments-list');
      const fresh = getPost(postId);
      if (fresh.comments.length === 0) {
        list.innerHTML = '<div class="no-comments">Zatím žádné komentáře</div>';
      } else {
        list.innerHTML = fresh.comments.map(c =>
          `<div class="comment"><span class="author">${escapeHtml(c.author)}:</span>${escapeHtml(c.text)}</div>`
        ).join('');
      }
      commentToggleBtn.querySelector('.comment-count').textContent = fresh.comments.length;
    }
    renderComments();

    likeBtn.addEventListener('click', () => {
      updatePost(postId, p => {
        p.liked = !p.liked;
        p.likes += p.liked ? 1 : -1;
        if (p.likes < 0) p.likes = 0;
      });
      const fresh = getPost(postId);
      likeBtn.classList.toggle('liked', fresh.liked);
      likeBtn.querySelector('.like-count').textContent = fresh.likes;
    });

    commentToggleBtn.addEventListener('click', () => {
      commentsSection.classList.toggle('open');
    });

    const form = commentsSection.querySelector('.comment-form');
    const authorInput = form.querySelector('input[name="author"]');
    const textInput = form.querySelector('input[name="text"]');
    const submitBtn = form.querySelector('button');

    function submitComment() {
      const author = authorInput.value.trim() || 'Anonymní svišť';
      const text = textInput.value.trim();
      if (!text) return;
      updatePost(postId, p => p.comments.push({ author, text }));
      textInput.value = '';
      renderComments();
    }

    submitBtn.addEventListener('click', submitComment);
    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitComment();
    });
  });

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
